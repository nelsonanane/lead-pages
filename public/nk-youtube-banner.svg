<svg viewBox="0 0 2560 1440" width="2560" height="1440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#F0C030" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#F0C030" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(240,192,48,0.04)" stroke-width="1"/>
    </pattern>
    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(0,0,0,0.18)"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="2560" height="1440" fill="#080A06"/>
  <rect width="2560" height="1440" fill="url(#grid)"/>
  <rect width="2560" height="1440" fill="url(#glow)"/>

  <!-- Horizontal rules -->
  <line x1="0" y1="200" x2="2560" y2="200" stroke="rgba(240,192,48,0.06)" stroke-width="1"/>
  <line x1="0" y1="1240" x2="2560" y2="1240" stroke="rgba(240,192,48,0.06)" stroke-width="1"/>

  <!-- Left terminal text -->
  <rect x="48" y="460" width="2" height="184" fill="rgba(240,192,48,0.18)"/>
  <text x="80" y="480" font-family="'Kode Mono', 'Courier New', monospace" font-size="18" fill="rgba(240,192,48,0.12)" letter-spacing="2">$ init --mode=create</text>
  <text x="80" y="516" font-family="'Kode Mono', 'Courier New', monospace" font-size="18" fill="rgba(240,192,48,0.08)" letter-spacing="2">Loading AI systems...</text>
  <text x="80" y="552" font-family="'Kode Mono', 'Courier New', monospace" font-size="18" fill="rgba(240,192,48,0.08)" letter-spacing="2">Content pipeline: ACTIVE</text>
  <text x="80" y="588" font-family="'Kode Mono', 'Courier New', monospace" font-size="18" fill="rgba(240,192,48,0.06)" letter-spacing="2">Tools: [gpt-4o] [claude] [midjourney]</text>
  <text x="80" y="624" font-family="'Kode Mono', 'Courier New', monospace" font-size="18" fill="rgba(240,192,48,0.06)" letter-spacing="2">Status: BUILDING__</text>

  <!-- Right text -->
  <rect x="2110" y="460" width="2" height="110" fill="rgba(240,192,48,0.18)"/>
  <text x="2100" y="480" font-family="'Kode Mono', 'Courier New', monospace" font-size="18" fill="rgba(240,192,48,0.12)" letter-spacing="2" text-anchor="end">nelsonkwesi.xyz</text>
  <text x="2100" y="516" font-family="'Kode Mono', 'Courier New', monospace" font-size="18" fill="rgba(240,192,48,0.08)" letter-spacing="2" text-anchor="end">@nelsonkwesi</text>
  <text x="2100" y="552" font-family="'Kode Mono', 'Courier New', monospace" font-size="18" fill="rgba(240,192,48,0.06)" letter-spacing="2" text-anchor="end">NEW VIDEOS // WEEKLY</text>

  <!-- Main wordmark -->
  <text x="1280" y="670" font-family="'Kode Mono', 'Courier New', monospace" font-weight="700" font-size="172" fill="#F0C030" text-anchor="middle" letter-spacing="-2">nelsonkwesi</text>

  <!-- Cursor -->
  <rect x="1848" y="510" width="38" height="162" fill="#F0C030"/>

  <!-- Tagline -->
  <text x="1280" y="760" font-family="'Kode Mono', 'Courier New', monospace" font-size="26" fill="rgba(240,192,48,0.5)" text-anchor="middle" letter-spacing="10">AI TOOLS  //  CONTENT  //  TECH</text>

  <!-- Underline -->
  <rect x="507" y="788" width="1546" height="2" fill="rgba(240,192,48,0.15)"/>

  <!-- Scanlines + vignette -->
  <rect width="2560" height="1440" fill="url(#scanlines)" opacity="0.6"/>
  <rect width="2560" height="1440" fill="url(#vignette)"/>
</svg>
